<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Most Visited Locations — Vesser Selene</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #0d0d0f;
      --paper: #f5f0e8;
      --cream: #ede7d6;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --rose: #c4706a;
      --mist: rgba(245,240,232,0.05);
      --mist-2: rgba(245,240,232,0.1);
      --border: rgba(201,168,76,0.2);
      --font-display: 'Cinzel', serif;
      --font-body: 'Cormorant Garamond', serif;
      --font-sans: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* noise */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.6;
    }
    /* glows */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 55% 40% at 10% 20%, rgba(201,168,76,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 45% 45% at 90% 80%, rgba(196,112,106,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* scroll bar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(245,240,232,0.05); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(var(--gold), var(--rose)); border-radius: 3px; }

    /* ── SCROLL PROGRESS ── */
    #scrollProgress {
      position: fixed; top: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      width: 0%; z-index: 10000; transition: width 0.1s linear;
    }

    /* ── WRAPPER ── */
    .wrapper {
      max-width: 1280px; margin: 0 auto;
      padding: 0 2rem; position: relative; z-index: 1;
    }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: var(--font-sans); font-size: 0.72rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(201,168,76,0.6); text-decoration: none;
      padding: 1.5rem 2rem 0;
      max-width: 1280px; margin: 0 auto; display: block;
      position: relative; z-index: 1;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }

    /* ── HEADER ── */
    .page-header {
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
      text-align: center;
      animation: fadeDown 0.7s ease both;
    }
    .page-header .eyebrow {
      font-family: var(--font-sans); font-size: 0.72rem;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 0.75rem; display: block;
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 600; letter-spacing: 0.1em;
      background: linear-gradient(135deg, var(--paper) 0%, var(--gold) 60%, var(--rose) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .page-header .date-line {
      font-family: var(--font-sans); font-size: 0.78rem;
      color: rgba(245,240,232,0.35); letter-spacing: 0.1em;
    }

    /* ── GRID ── */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
      margin-bottom: 4rem;
    }
    @media (max-width: 1024px) { .content-grid { grid-template-columns: 1fr; } }

    /* ── CARD ── */
    .card {
      background: var(--mist);
      border: 1px solid var(--border);
      border-radius: 2px;
      position: relative; overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .card.delay-1 { animation-delay: 0.15s; }
    .card.delay-2 { animation-delay: 0.3s; }

    /* ── MAP ── */
    .map-card { padding: 1.5rem; }
    .map-label {
      font-family: var(--font-sans); font-size: 0.68rem;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1rem; display: block;
    }
    #map {
      height: 500px; width: 100%;
      border-radius: 2px; overflow: hidden;
      border: 1px solid var(--border);
    }
    @media (max-width: 768px) { #map { height: 320px; } }

    /* override leaflet popup */
    .leaflet-popup-content-wrapper {
      background: #111115 !important;
      border: 1px solid var(--border) !important;
      border-radius: 2px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
      color: var(--paper) !important;
    }
    .leaflet-popup-tip { background: #111115 !important; }
    .leaflet-popup-close-button { color: var(--gold) !important; }

    /* ── STATS ── */
    .stats-card { padding: 2rem; }
    .stats-header { text-align: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .stats-header h2 {
      font-family: var(--font-display); font-size: 0.85rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1rem;
    }
    .total-number {
      font-family: var(--font-display);
      font-size: 4rem; font-weight: 600;
      background: linear-gradient(135deg, var(--gold), var(--rose));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1; margin-bottom: 0.4rem;
    }
    .total-label {
      font-family: var(--font-sans); font-size: 0.72rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(245,240,232,0.35);
    }

    /* ── COUNTRY LIST ── */
    .country-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .country-item {
      display: flex; align-items: center;
      padding: 0.85rem 1rem;
      background: rgba(245,240,232,0.03);
      border: 1px solid rgba(201,168,76,0.1);
      border-radius: 2px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: border-color 0.25s, background 0.25s, transform 0.25s;
    }
    .country-item:hover {
      border-color: rgba(201,168,76,0.35);
      background: rgba(201,168,76,0.06);
      transform: translateX(4px);
    }
    .country-flag { font-size: 1.25rem; margin-right: 0.75rem; flex-shrink: 0; }
    .country-name {
      font-family: var(--font-sans); font-size: 0.85rem;
      color: var(--paper); flex: 1; font-weight: 400;
    }
    .country-visits {
      font-family: var(--font-display); font-size: 1rem;
      font-weight: 600; color: var(--gold);
      margin-right: 0.75rem; min-width: 28px; text-align: right;
    }
    .country-bar-wrap {
      width: 60px; height: 3px;
      background: rgba(245,240,232,0.08); border-radius: 1px; flex-shrink: 0;
    }
    .country-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      border-radius: 1px; width: 0;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    }
    /* rank badge */
    .rank {
      font-family: var(--font-sans); font-size: 0.6rem;
      letter-spacing: 0.1em; color: rgba(245,240,232,0.25);
      min-width: 1.5rem; margin-right: 0.5rem; text-align: center;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem; text-align: center;
      position: relative; z-index: 1;
    }
    footer p {
      font-family: var(--font-sans); font-size: 0.72rem;
      color: rgba(245,240,232,0.3); letter-spacing: 0.05em;
    }
    footer a { color: rgba(201,168,76,0.5); text-decoration: none; }
    footer a:hover { color: var(--gold); }

    /* ── ANIMS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="scrollProgress"></div>

  <a href="index.html" class="back-link">← Back to Vesser Selene</a>

  <div class="wrapper">
    <div class="page-header">
      <span class="eyebrow">Global Readership</span>
      <h1>Most Visited Locations</h1>
      <p class="date-line">Updated: <span id="current-date"></span></p>
    </div>

    <div class="content-grid">
      <!-- Map -->
      <div class="card map-card delay-1">
        <span class="map-label">Interactive World Map</span>
        <div id="map"></div>
      </div>

      <!-- Stats -->
      <div class="card stats-card delay-2">
        <div class="stats-header">
          <h2>Travel Statistics</h2>
          <div class="total-number" id="total-visits">0</div>
          <div class="total-label">Total Visits</div>
        </div>
        <div class="country-list" id="country-list"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Fiverr Company Limited. All rights reserved. &nbsp;·&nbsp; <a href="index.html">Vesser Selene</a></p>
  </footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Scroll progress
    window.addEventListener('scroll', () => {
      const pct = (window.pageYOffset / (document.body.offsetHeight - window.innerHeight)) * 100;
      document.getElementById('scrollProgress').style.width = pct + '%';
    });

    // Date
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', {
      year: 'numeric', month: 'long', day: 'numeric'
    });

    // Data
    const countryData = [
      { name: 'USA',       visits: 69, lat: 39.8283, lng: -98.5795,  flag: '🇺🇸' },
      { name: 'Maldives',  visits: 35, lat: 3.2028,  lng: 73.2207,   flag: '🇲🇻' },
      { name: 'Australia', visits: 15, lat: -25.2744,lng: 133.7751,  flag: '🇦🇺' },
      { name: 'England',   visits: 25, lat: 52.3555, lng: -1.1743,   flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
      { name: 'India',     visits: 15, lat: 20.5937, lng: 78.9629,   flag: '🇮🇳' },
      { name: 'Sri Lanka', visits: 18, lat: 7.8731,  lng: 80.7718,   flag: '🇱🇰' },
      { name: 'Egypt',       visits: 1,  lat: 26.0975,  lng: 31.2357,   flag: '🇪🇬' },
      { name: 'China',       visits: 3,  lat: 35.8617,  lng: 104.1954,  flag: '🇨🇳' },
      { name: 'Japan',       visits: 7,  lat: 36.2048,  lng: 138.2529,  flag: '🇯🇵' },
      { name: 'Brazil',      visits: 3,  lat: -14.2350, lng: -51.9253,  flag: '🇧🇷' },
      { name: 'Nigeria',     visits: 4,  lat: 9.0820,   lng: 8.6753,    flag: '🇳🇬' },
      { name: 'South Korea', visits: 2,  lat: 35.9078,  lng: 127.7669,  flag: '🇰🇷' },
      { name: 'Pakistan',    visits: 5,  lat: 30.3753,  lng: 69.3451,   flag: '🇵🇰' },
    ];

    countryData.sort((a, b) => b.visits - a.visits);
    const totalVisits = countryData.reduce((s, c) => s + c.visits, 0);
    const maxVisits   = Math.max(...countryData.map(c => c.visits));

    // Animate count
    let current = 0;
    const timer = setInterval(() => {
      current = Math.min(current + Math.ceil(totalVisits / 60), totalVisits);
      document.getElementById('total-visits').textContent = current;
      if (current >= totalVisits) clearInterval(timer);
    }, 25);

    // Country list
    const list = document.getElementById('country-list');
    countryData.forEach((c, i) => {
      const item = document.createElement('div');
      item.className = 'country-item';
      item.innerHTML = `
        <span class="rank">${String(i+1).padStart(2,'0')}</span>
        <span class="country-flag">${c.flag}</span>
        <span class="country-name">${c.name}</span>
        <span class="country-visits">${c.visits}</span>
        <div class="country-bar-wrap"><div class="country-bar" id="bar-${i}" style="width:0%"></div></div>
      `;
      item.addEventListener('click', () => map.setView([c.lat, c.lng], 5));
      list.appendChild(item);
      setTimeout(() => {
        document.getElementById('bar-'+i).style.width = ((c.visits / maxVisits) * 100) + '%';
      }, 400 + i * 80);
    });

    // Map
    const map = L.map('map', { center: [20, 0], zoom: 2, zoomControl: true });

    // Dark-ish tile (CartoDB dark matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(map);

    countryData.forEach(c => {
      const icon = L.divIcon({
        className: '',
        html: `<div style="font-size:28px;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6));cursor:pointer;transition:transform .2s;"
                     onmouseover="this.style.transform='scale(1.25)'"
                     onmouseout="this.style.transform='scale(1)'">${c.flag}</div>`,
        iconSize: [36, 36], iconAnchor: [18, 32]
      });

      L.marker([c.lat, c.lng], { icon })
        .addTo(map)
        .bindPopup(`
          <div style="text-align:center;font-family:'DM Sans',sans-serif;padding:6px 4px;">
            <div style="font-size:2rem;margin-bottom:6px;">${c.flag}</div>
            <strong style="display:block;font-size:1rem;color:#f5f0e8;margin-bottom:4px;">${c.name}</strong>
            <span style="font-size:0.85rem;color:#c9a84c;letter-spacing:.05em;">${c.visits} visits</span>
          </div>
        `, { maxWidth: 180 });
    });

    // Resize
    window.addEventListener('resize', () => setTimeout(() => map.invalidateSize(), 100));
  </script>
</body>
</html>
