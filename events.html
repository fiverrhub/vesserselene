<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Literary Awards — Vesser Selene</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #0d0d0f;
      --paper: #f5f0e8;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.18);
      --rose: #c4706a;
      --rose-dim: rgba(196,112,106,0.18);
      --mist: rgba(245,240,232,0.04);
      --border: rgba(201,168,76,0.2);
      --border-soft: rgba(245,240,232,0.07);
      --font-display: 'Cinzel', serif;
      --font-body: 'Cormorant Garamond', serif;
      --font-sans: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* noise layer */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.55;
    }
    /* ambient glows */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 45% at 10% 15%, rgba(201,168,76,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 90% 85%, rgba(196,112,106,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 35% at 50% 50%, rgba(201,168,76,0.03) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* scroll progress */
    #sp {
      position: fixed; top: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      width: 0; z-index: 10001; transition: width 0.1s linear;
    }

    /* custom scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(var(--gold), var(--rose)); border-radius: 3px; }

    /* ── WRAPPER ── */
    .w { max-width: 1160px; margin: 0 auto; padding: 0 2rem; position: relative; z-index: 1; }

    /* ── BACK LINK ── */
    .back {
      display: inline-flex; align-items: center; gap: 0.45rem;
      font-family: var(--font-sans); font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(201,168,76,0.55); text-decoration: none;
      padding: 1.5rem 2rem 0; max-width: 1160px; margin: 0 auto;
      position: relative; z-index: 1; display: block;
      transition: color 0.2s;
    }
    .back:hover { color: var(--gold); }

    /* ── PAGE HEADER ── */
    .ph {
      padding: 3.5rem 0 2.5rem; border-bottom: 1px solid var(--border);
      margin-bottom: 4rem; text-align: center;
      animation: fd 0.7s ease both;
    }
    .ph .eyebrow {
      font-family: var(--font-sans); font-size: 0.68rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 0.9rem;
    }
    .ph h1 {
      font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 600; letter-spacing: 0.1em;
      background: linear-gradient(135deg, var(--paper) 0%, var(--gold) 55%, var(--rose) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 0.75rem; line-height: 1.1;
    }
    .ph .sub {
      font-family: var(--font-body); font-style: italic; font-size: 1.2rem;
      color: rgba(245,240,232,0.45);
    }

    /* ── FILTER BAR ── */
    .filters {
      display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center;
      margin-bottom: 3rem; animation: fu 0.6s 0.2s ease both;
    }
    .filter-btn {
      font-family: var(--font-sans); font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 0.45rem 1rem; border-radius: 2px; cursor: pointer;
      background: transparent; border: 1px solid var(--border-soft);
      color: rgba(245,240,232,0.45); transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--gold); color: var(--gold);
      background: rgba(201,168,76,0.07);
    }

    /* ── AWARDS GRID ── */
    .grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
      margin-bottom: 5rem;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }

    /* ── AWARD CARD ── */
    .award-card {
      background: var(--mist); border: 1px solid var(--border-soft);
      border-radius: 2px; padding: 1.75rem 1.5rem;
      display: flex; flex-direction: column; gap: 0;
      position: relative; overflow: hidden;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
      animation: fu 0.5s ease both;
    }
    .award-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .award-card:hover {
      border-color: rgba(201,168,76,0.35); transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }
    .award-card:hover::before { opacity: 1; }

    /* prize accent stripe */
    .prize-stripe {
      position: absolute; top: 0; left: 0; bottom: 0; width: 3px;
    }
    .stripe-gold  { background: linear-gradient(var(--gold), rgba(201,168,76,0.2)); }
    .stripe-rose  { background: linear-gradient(var(--rose), rgba(196,112,106,0.2)); }
    .stripe-teal  { background: linear-gradient(#6bbcb0, rgba(107,188,176,0.2)); }
    .stripe-blue  { background: linear-gradient(#7ba8d4, rgba(123,168,212,0.2)); }
    .stripe-green { background: linear-gradient(#7ecba0, rgba(126,203,160,0.2)); }
    .stripe-amber { background: linear-gradient(#d4a056, rgba(212,160,86,0.2)); }

    .card-org {
      font-family: var(--font-sans); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 0.6rem; padding-left: 0.75rem;
    }
    .card-title {
      font-family: var(--font-display); font-size: 1.05rem; letter-spacing: 0.05em;
      color: var(--paper); margin-bottom: 1.25rem; line-height: 1.3;
      padding-left: 0.75rem;
    }

    .card-meta { display: flex; flex-direction: column; gap: 0.55rem; padding-left: 0.75rem; flex: 1; }
    .meta-row {
      display: flex; align-items: center; gap: 0.6rem;
    }
    .meta-icon {
      font-size: 0.8rem; width: 1.1rem; text-align: center; flex-shrink: 0;
      opacity: 0.6;
    }
    .meta-label {
      font-family: var(--font-sans); font-size: 0.67rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(245,240,232,0.35); width: 3.5rem; flex-shrink: 0;
    }
    .meta-value {
      font-family: var(--font-sans); font-size: 0.78rem; color: rgba(245,240,232,0.8);
    }
    .meta-value.prize {
      font-family: var(--font-display); font-size: 1rem; font-weight: 600;
      color: var(--gold);
    }
    .meta-value.free {
      color: #7ecba0; font-size: 0.72rem; letter-spacing: 0.08em;
    }

    .genre-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 1.25rem; padding-left: 0.75rem; }
    .tag {
      font-family: var(--font-sans); font-size: 0.6rem; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.25rem 0.6rem; border-radius: 1px;
      border: 1px solid var(--border-soft); color: rgba(245,240,232,0.45);
      transition: all 0.2s;
    }
    .award-card:hover .tag { border-color: rgba(201,168,76,0.25); color: rgba(245,240,232,0.65); }

    /* ── DEADLINE URGENCY ── */
    .deadline-soon { color: var(--rose) !important; }
    .deadline-dot {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      background: var(--rose); margin-right: 0.3rem;
      box-shadow: 0 0 6px var(--rose);
      animation: pdot 2s ease-in-out infinite;
    }
    @keyframes pdot { 0%,100% { box-shadow: 0 0 4px var(--rose); } 50% { box-shadow: 0 0 10px var(--rose); } }

    /* ── SUMMARY BAR ── */
    .summary {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
      margin-bottom: 4rem; animation: fu 0.5s 0.1s ease both;
    }
    @media (max-width: 580px) { .summary { grid-template-columns: 1fr; } }
    .sum-item {
      background: var(--mist); border: 1px solid var(--border);
      border-radius: 2px; padding: 1.25rem; text-align: center;
      position: relative; overflow: hidden;
    }
    .sum-item::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .sum-num {
      font-family: var(--font-display); font-size: 2rem; font-weight: 600;
      background: linear-gradient(135deg, var(--gold), var(--rose));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      display: block; margin-bottom: 0.3rem;
    }
    .sum-label {
      font-family: var(--font-sans); font-size: 0.68rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(245,240,232,0.35);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border); padding: 2rem; text-align: center;
      position: relative; z-index: 1;
    }
    footer p { font-family: var(--font-sans); font-size: 0.72rem; color: rgba(245,240,232,0.25); }
    footer a { color: rgba(201,168,76,0.45); text-decoration: none; }
    footer a:hover { color: var(--gold); }

    /* ── ANIMS ── */
    @keyframes fd { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fu { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    /* empty state */
    .empty { text-align: center; padding: 4rem 0; color: rgba(245,240,232,0.25); }
    .empty span { font-family: var(--font-display); font-size: 1rem; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <div id="sp"></div>

  <a href="index.html" class="back">← Back to Vesser Selene</a>

  <div class="w">

    <!-- Header -->
    <div class="ph">
      <span class="eyebrow">Opportunities &amp; Recognition</span>
      <h1>Literary Awards 2026</h1>
      <p class="sub">Curated awards &amp; fellowships for emerging voices</p>
    </div>

    <!-- Cards -->
    <div class="grid" id="cards-grid"></div>

  </div>

  <footer>
    <p>&copy; 2025 Fiverr Company Limited. All rights reserved. &nbsp;·&nbsp; <a href="index.html">Vesser Selene</a></p>
  </footer>

  <script>
    // Scroll progress
    window.addEventListener('scroll', () => {
      document.getElementById('sp').style.width =
        (window.pageYOffset / (document.body.offsetHeight - window.innerHeight) * 100) + '%';
    });

    const awards = [
      {
        org: 'Interlochen Center for the Arts',
        title: 'Pattis Family Foundation Creative Arts Book Award',
        prize: '$10,000',
        fee: '$0',
        deadline: '20/05/26',
        genres: ['Poetry', 'Fiction', 'Creative Nonfiction'],
        stripe: 'stripe-gold',
      },
      {
        org: 'Kansas City Public Library',
        title: 'Maya Angelou Book Award',
        prize: '$15,000',
        fee: '$0',
        deadline: '20/7/26',
        genres: ['Poetry', 'Fiction'],
        stripe: 'stripe-rose',
      },
      {
        org: 'Ursula K. Le Guin Foundation',
        title: 'Ursula K. Le Guin Prize for Fiction',
        prize: '$25,000',
        fee: '$500',
        deadline: '30/07/26',
        genres: ['Fiction'],
        stripe: 'stripe-teal',
      },
      {
        org: 'Georgia Writers',
        title: 'Sapphic Stories Literary Success Grants',
        prize: '$500',
        fee: '$0',
        deadline: '20/06/26',
        genres: ['Poetry', 'Fiction', 'Creative Nonfiction'],
        stripe: 'stripe-blue',
      },
      {
        org: 'Book Industry Charitable Foundation',
        title: 'Susan Kamil Emerging Writers Prize',
        prize: '$10,000',
        fee: '$0',
        deadline: '30/03/26',
        genres: ['Poetry', 'Fiction', 'Creative Nonfiction'],
        stripe: 'stripe-green',
      },
      {
        org: 'A Public Space',
        title: 'Writing Fellowships',
        prize: '$1,000',
        fee: '$0',
        deadline: '30/05/26',
        genres: ['Poetry', 'Fiction', 'Creative Nonfiction'],
        stripe: 'stripe-amber',
      },
    ];

    // Determine if deadline is soon (within ~60 days of today)
    function isSoon(dl) {
      const [m, d, y] = dl.split('/');
      const date = new Date(`20${y}`, m - 1, d);
      const diff = (date - new Date()) / (1000 * 60 * 60 * 24);
      return diff >= 0 && diff <= 60;
    }

    function buildCard(a, delay) {
      const soon = isSoon(a.deadline);
      return `
        <div class="award-card" data-genres="${a.genres.join(',')}" style="animation-delay:${delay}s">
          <div class="prize-stripe ${a.stripe}"></div>
          <div class="card-org">${a.org}</div>
          <div class="card-title">${a.title}</div>
          <div class="card-meta">
            <div class="meta-row">
              <span class="meta-icon">💰</span>
              <span class="meta-label">Prize</span>
              <span class="meta-value prize">${a.prize}</span>
            </div>
            <div class="meta-row">
              <span class="meta-icon">🎟</span>
              <span class="meta-label">Fee</span>
              <span class="meta-value free">Free to Enter</span>
            </div>
            <div class="meta-row">
              <span class="meta-icon">📅</span>
              <span class="meta-label">Deadline</span>
              <span class="meta-value ${soon ? 'deadline-soon' : ''}">
                ${soon ? '<span class="deadline-dot"></span>' : ''}${a.deadline}
              </span>
            </div>
          </div>
          <div class="genre-tags">
            ${a.genres.map(g => `<span class="tag">${g}</span>`).join('')}
          </div>
        </div>`;
    }

    function render(list) {
      const grid = document.getElementById('cards-grid');
      if (list.length === 0) {
        grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><span>No awards match this filter.</span></div>';
        return;
      }
      grid.innerHTML = list.map((a, i) => buildCard(a, i * 0.07)).join('');
      document.getElementById('s-awards').textContent = list.length;
    }

    function filter(genre, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (genre === 'all') { render(awards); return; }
      render(awards.filter(a => a.genres.includes(genre)));
    }

    render(awards);
  </script>
</body>
</html>
